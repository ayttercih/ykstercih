<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKS Tercih 2026 | Liyakat Motoru</title>
    
    <style>
        /* GENEL YAPI */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #f4f7f6; }
        
        /* FİLTRE VE ARAMA ALANI */
        .filtre-alani { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; background-color: #F8FAFC; padding: 20px; border-radius: 8px; border-left: 5px solid #FF5722; }
        .filtre-alani input, .filtre-alani select { padding: 12px; border: 2px solid #0A2044; border-radius: 6px; font-size: 1rem; flex: 1; min-width: 200px; }
        .filtre-alani button { background-color: #FF5722; color: white; border: none; padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s;}
        .filtre-alani button:hover { background-color: #0A2044; }

        /* TABLO TASARIMI (HİZALAMALAR BURADA) */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        thead { background-color: #0A2044; color: white; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f5f9; }

        /* DETAYLI İNCELE BUTONU (YENİ) */
        .btn-detay {
            display: inline-flex; align-items: center; justify-content: center;
            background-color: #0A2044; color: #FFC107;
            padding: 8px 16px; font-size: 0.9rem; font-weight: bold;
            text-decoration: none; border-radius: 6px;
            transition: all 0.3s ease; border: 1px solid #0A2044;
            min-width: 100px;
        }
        .btn-detay:hover {
            background-color: #FF5722; color: #ffffff;
            border-color: #FF5722; box-shadow: 0 4px 10px rgba(255, 87, 34, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="motorIcerik">
        
        <div class="filtre-alani">
            <input type="text" id="aramaKutusu" placeholder="Üniversite veya Bölüm Ara (Örn: ODTÜ, Tıp)..." onkeyup="sonuclariFiltrele()">
            
            <select id="siralamaKriteri" onchange="sonuclariFiltrele()">
                <option value="varsayilan">Sıralama Ölçütü Seçin...</option>
                <option value="urap">URAP'a Göre Sırala (En İyi)</option>
                <option value="qs">QS'e Göre Sırala (En İyi)</option>
                <option value="the">THE'ye Göre Sırala (En İyi)</option>
            </select>

            <button onclick="sonuclariFiltrele()">Filtrele</button>
        </div>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">Üniversite</th>
                        <th style="width: 20%;">Bölüm / Alan</th>
                        <th style="width: 25%;">
                            Dünya Sıralaması <br>
                            <span style="font-size: 0.8em; font-weight: normal;">URAP (İlk 3.000) &nbsp;|&nbsp; QS (İlk 1.500) &nbsp;|&nbsp; THE (İlk 1.900)</span>
                        </th>
                        <th style="width: 20%;">Akademik Kadro</th>
                        <th style="width: 10%; text-align: center;">İşlem</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script src="veri/universiteler.js" defer></script>

    <script defer>
        function tabloyuCiz(veriDizisi) {
            const tabloGovdesi = document.querySelector("table tbody");
            if(!tabloGovdesi) return;
            tabloGovdesi.innerHTML = ""; 

            veriDizisi.forEach(uni => {
                let satir = `
                    <tr>
                        <td>
                            <strong>${uni.isim}</strong><br>
                            <span style="font-size: 0.8em; color: gray;">${uni.kadro}</span>
                        </td>
                        <td>${uni.bolum}</td>
                        <td>
                            <span style="color:#0A2044; font-weight:bold;">URAP:</span> ${uni.urap}<br>
                            <span style="color:#FF5722; font-weight:bold;">QS:</span> ${uni.qs}<br>
                            <span style="color:#3A5A80; font-weight:bold;">THE:</span> ${uni.the}
                        </td>
                        <td>${uni.kadro}</td>
                        <td style="text-align: center; vertical-align: middle;">
                            <a href="${uni.universiteLink}" class="btn-detay">İncele ➔</a>
                        </td>
                    </tr>
                `;
                tabloGovdesi.innerHTML += satir;
            });
        }

        function sayiyaCevir(deger) {
            if (!deger || deger === "Listelenmiyor" || deger === "Yok" || deger === "Bilgi Yok") return 999999;
            return parseInt(deger.split('-')[0].replace(/[^0-9]/g, ''));
        }

        function sonuclariFiltrele() {
            const aramaKutusu = document.getElementById("aramaKutusu");
            const arama = aramaKutusu ? aramaKutusu.value.toLowerCase() : "";
            
            const siralamaKutusu = document.getElementById("siralamaKriteri");
            const siralama = siralamaKutusu ? siralamaKutusu.value : "varsayilan";
            
            let filtrelenmis = universiteVerileri.filter(v => 
                (v.isim && v.isim.toLowerCase().includes(arama)) || 
                (v.bolum && v.bolum.toLowerCase().includes(arama))
            );

            if (siralama === "urap") {
                filtrelenmis.sort((a, b) => sayiyaCevir(a.urap) - sayiyaCevir(b.urap));
            } else if (siralama === "qs") {
                filtrelenmis.sort((a, b) => sayiyaCevir(a.qs) - sayiyaCevir(b.qs));
            } else if (siralama === "the") {
                filtrelenmis.sort((a, b) => sayiyaCevir(a.the) - sayiyaCevir(b.the));
            }

            tabloyuCiz(filtrelenmis);
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof universiteVerileri !== 'undefined') {
                tabloyuCiz(universiteVerileri);
            } else {
                console.error("HATA: universiteVerileri dizisi bulunamadı!");
            }
        });
    </script>
</body>
</html>
